name: ${DOCKER_PROJECT_NAME:-nextjs-template}

x-logging: &default-logging
  logging:
    driver: "json-file"
    options:
      max-size: "10m"
      max-file: "3"

services:
  app:
    container_name: ${DOCKER_CONTAINER_NAME:-nextjs-template}
    build:
      context: .
      dockerfile: Dockerfile
    image: ${DOCKER_IMAGE_NAME:-nextjs-template}:${DOCKER_IMAGE_TAG:-latest}
    restart: unless-stopped
    ports:
      - "${DOCKER_PORT:-3000}:3000"
    environment:
      - NODE_ENV=production
    env_file:
      - path: ./.env
        required: false
    <<: *default-logging
