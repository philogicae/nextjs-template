name: nextjs-template

x-logging: &default-logging
  logging:
    driver: "json-file"
    options:
      max-size: "10m"
      max-file: "3"

services:
  app:
    container_name: nextjs-template
    build:
      context: .
      dockerfile: Dockerfile
    image: nextjs-template
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
    <<: *default-logging
